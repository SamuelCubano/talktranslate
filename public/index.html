<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TalkTranslate</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app" id="app">
  <!-- LOBBY -->
  <div class="lobby" id="lobby">
    <div class="card">
      <div class="logo">
        <svg width="36" height="36" viewBox="0 0 48 48"><circle cx="24" cy="24" r="22" stroke="#7c5cfc" stroke-width="2.5" fill="none"/><path d="M16 28c0-4.418 3.582-8 8-8s8 3.582 8 8" stroke="#7c5cfc" stroke-width="2" fill="none" stroke-linecap="round"/><circle cx="24" cy="18" r="4" stroke="#7c5cfc" stroke-width="2" fill="none"/></svg>
        <h1>TalkTranslate</h1>
      </div>
      <p class="subtitle">Chat con traducción automática</p>

      <div class="field">
        <label>👤 Tu nombre</label>
        <input id="nickname" placeholder="Escribe tu nombre" maxlength="20">
      </div>

      <div class="lang-selector">
        <div class="lang-col">
          <label>🗣️ Hablas</label>
          <select id="my-lang">
            <option value="es">Español</option><option value="en">English</option>
            <option value="pt">Português</option><option value="fr">Français</option>
            <option value="de">Deutsch</option><option value="ja">日本語</option>
          </select>
        </div>
        <div class="lang-arrow">→</div>
        <div class="lang-col">
          <label>🌍 Traducir a</label>
          <select id="target-lang">
            <option value="en">English</option><option value="es">Español</option>
            <option value="pt">Português</option><option value="fr">Français</option>
            <option value="de">Deutsch</option><option value="ja">日本語</option>
          </select>
        </div>
      </div>

      <button class="btn btn-primary" onclick="createRoom()">Crear sala</button>
      <div class="divider">— o —</div>
      <input id="room-input" placeholder="ID de sala (ej: abc123)">
      <button class="btn btn-secondary" onclick="joinRoom()">Unirse</button>
    </div>
  </div>

  <!-- CHAT ROOM -->
  <div class="room hidden" id="room">
    <div class="chat-header">
      <div class="chat-header-info">
        <div class="chat-header-top">
          <span class="chat-title">TalkTranslate</span>
          <span class="room-badge" id="room-id-display"></span>
        </div>
        <div class="chat-participants" id="participants-msg"></div>
      </div>
      <div class="chat-header-langs">
        <select id="chat-my-lang" class="lang-select-sm"></select>
        <span class="lang-arrow-sm">→</span>
        <select id="chat-target-lang" class="lang-select-sm"></select>
      </div>
      <button class="btn btn-leave" onclick="leaveRoom()" title="Salir">✕</button>
    </div>

    <div class="chat-messages" id="chat-msgs">
      <div class="msg-placeholder" id="msg-placeholder">
        <p>Conéctate con alguien para empezar a chatear</p>
      </div>
    </div>

    <div class="chat-input-area">
      <input id="chat-input" placeholder="Escribe un mensaje..." maxlength="500">
      <button class="btn btn-send" onclick="sendChat()" id="send-btn">Enviar</button>
    </div>
  </div>
</div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script src="app.js"></script>
</body>
</html>
